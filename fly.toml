# fly.toml app configuration file generated for mentalist-inject on 2026-02-16T00:27:08-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "mentalist-inject"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true

  # Reliability for live shows:
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
