<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Audience</title>
  <style>
    :root{color-scheme:dark;--bg:#05050b;--text:#fff;--muted:#cfcfe8;--accent:#7c5cff}
    *{box-sizing:border-box} html,body{width:100%;height:100%;margin:0;overflow:hidden}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at top,#24244f,#05050b 58%);color:var(--text)}
    .view{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:clamp(18px,4vw,56px)}
    .hidden{display:none!important}
    .idleWrap{display:grid;place-items:center;gap:18px}.heart{font-size:min(34vw,190px);filter:drop-shadow(0 0 28px rgba(255,0,85,.55));animation:beat 1.05s infinite}.idleText{font-size:clamp(22px,5vw,48px);font-weight:800}.hint{font-size:clamp(14px,2.5vw,22px);color:var(--muted)}
    @keyframes beat{0%,100%{transform:scale(1)}12%{transform:scale(1.12)}24%{transform:scale(1)}36%{transform:scale(1.09)}50%{transform:scale(1)}}
    .soundBox{position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:50;background:rgba(0,0,0,.48);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:9px 10px;display:flex;gap:8px;align-items:center;backdrop-filter:blur(10px)}
    .soundBox button,.reviewBtn,.fallbackBtn{border:0;border-radius:999px;background:var(--accent);color:#fff;font-weight:800;padding:12px 16px;font-size:16px}.soundBox span{color:#fff;font-size:13px;padding-left:6px}
    #viewLogo img{max-width:min(78vw,620px);max-height:62vh;object-fit:contain;filter:drop-shadow(0 20px 70px rgba(0,0,0,.45))}
    #viewAnim{background:radial-gradient(circle at center,#201248,#05050b 70%)}.spiral{width:min(82vw,680px);aspect-ratio:1;border-radius:50%;background:repeating-conic-gradient(from 0deg,#fff 0deg 12deg,#111 12deg 24deg);mask:radial-gradient(circle,transparent 0 8%,#000 9%);animation:spin 1.1s linear infinite;box-shadow:0 0 90px rgba(124,92,255,.35)}@keyframes spin{to{transform:rotate(360deg)}}
    #fxLayer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:10}.fx{position:absolute;animation:floatUp var(--dur) linear forwards;opacity:.95}@keyframes floatUp{to{transform:translateY(-150vh) rotate(360deg);opacity:0}}
    #viewReveal{padding:0;background:#000}.revealMedia{width:100vw;height:100vh;border:0;object-fit:contain;background:#000}.fallback{position:fixed;bottom:calc(18px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:20}
    #viewClient{background:radial-gradient(circle at top,#291e5a,#080812 65%)}#clientCard{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);box-shadow:0 24px 90px rgba(0,0,0,.35);border-radius:34px;color:#fff;font-weight:900;letter-spacing:-.035em;text-shadow:0 4px 18px rgba(0,0,0,.4)}#clientImg{max-width:94vw;max-height:72vh;object-fit:contain;border-radius:28px;box-shadow:0 24px 90px rgba(0,0,0,.45)}#clientMsg{position:fixed;left:6vw;right:6vw;bottom:calc(28px + env(safe-area-inset-bottom));font-size:clamp(22px,4.5vw,56px);font-weight:850;text-shadow:0 4px 24px #000;white-space:pre-line}
    #viewReview{background:radial-gradient(circle at top,#1b315b,#05050b 64%);flex-direction:column;gap:18px}#viewReview h1{font-size:clamp(32px,7vw,82px);margin:0}.reviewBtn{font-size:clamp(20px,4vw,42px);padding:18px 28px}.countdown{font-size:clamp(16px,3vw,28px);color:var(--muted)}
    .reviewMsg{font-size:clamp(20px,4.4vw,46px);font-weight:800;line-height:1.25;max-width:90vw;white-space:pre-line;text-shadow:0 4px 20px rgba(0,0,0,.45)}
    .idleLogo{max-width:min(78vw,560px);max-height:54vh;object-fit:contain;background:#fff;border-radius:28px;padding:clamp(20px,5vw,44px);box-shadow:0 18px 60px rgba(0,0,0,.45)}
    .net{display:none}

    #viewKaraoke{padding:0;overflow:hidden;background:#050505;position:fixed;inset:0;}
    #karaokeBg{position:absolute;inset:-24px;background-size:cover;background-position:center;filter:blur(24px);transform:scale(1.08);opacity:.72;}
    #karaokeOverlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.32),rgba(0,0,0,.72));}
    #karaokeContent{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:clamp(22px,5vw,60px);gap:14px;}
    .karaokeTitle{font-size:clamp(14px,3vw,26px);font-weight:800;color:rgba(255,255,255,.72);margin-bottom:8px;}
    .karaokeLine{max-width:96vw;white-space:pre-line;text-shadow:0 0 22px rgba(0,0,0,.75);transition:opacity .18s ease, transform .18s ease;}
    .karaokeCurrent{font-size:clamp(38px,10.5vw,112px);line-height:1.02;font-weight:1000;letter-spacing:-.055em;color:#fff;text-shadow:0 0 22px rgba(142,255,36,.52),0 6px 30px rgba(0,0,0,.7);}
    .karaokeDim{font-size:clamp(18px,4.6vw,42px);font-weight:850;color:rgba(255,255,255,.58);min-height:1.2em;}
    .karaokeStatus{font-size:clamp(13px,3vw,22px);font-weight:750;color:rgba(255,255,255,.72);min-height:1.2em;}
    .karaokeStartBtn{border:0;border-radius:999px;background:#9cff00;color:#071100;font-weight:950;font-size:clamp(17px,4vw,26px);padding:16px 24px;box-shadow:0 0 34px rgba(156,255,0,.35);margin-top:10px;}
    .karaokeBars{height:44px;display:flex;gap:7px;align-items:flex-end;justify-content:center;filter:drop-shadow(0 0 14px rgba(156,255,0,.8));}
    .karaokeBars span{display:block;width:7px;border-radius:99px;background:#9cff00;animation:kbar .7s ease-in-out infinite alternate;}
    .karaokeBars span:nth-child(1){height:16px;animation-delay:.0s}.karaokeBars span:nth-child(2){height:30px;animation-delay:.12s}.karaokeBars span:nth-child(3){height:40px;animation-delay:.24s}.karaokeBars span:nth-child(4){height:24px;animation-delay:.36s}
    @keyframes kbar{from{transform:scaleY(.45);opacity:.58}to{transform:scaleY(1);opacity:1}}
  </style>
<!-- karaoke-thanks-review-v11 -->

<style>
  #karaokeScreen,
  #karaoke {
    background-size: cover !important;
    background-position: center center !important;
    background-repeat: no-repeat !important;
  }
  #karaokeScreen .karaoke-bg,
  #karaokeBg,
  .karaoke-bg {
    position: absolute !important;
    inset: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    background-size: cover !important;
    background-position: center center !important;
    background-repeat: no-repeat !important;
    opacity: 0.6 !important;
    filter: blur(9px) brightness(0.55) saturate(1.15) !important;
    transform: scale(1.08) !important;
    z-index: 0 !important;
  }
  #karaokeScreen::after,
  #karaoke::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(0,0,0,.12), rgba(0,0,0,.72));
    z-index: 1;
    pointer-events: none;
  }
  #karaokeScreen > *:not(.karaoke-bg):not(#karaokeBg),
  #karaoke > *:not(.karaoke-bg):not(#karaokeBg) {
    position: relative;
    z-index: 2;
  }
</style>

<!-- karaoke-photo-end-v12 -->

<style>
  #karaokePhotoEnd {
    position: fixed !important;
    inset: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    background: #000 !important;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    z-index: 9998;
  }
  #karaokePhotoEnd.hidden {
    display: none !important;
  }
  #karaokePhotoEndImg {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    background: #000;
  }
  #karaokePhotoEndText {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 7vh;
    text-align: center;
    color: white;
    font-size: clamp(28px, 7vw, 70px);
    font-weight: 800;
    text-shadow: 0 4px 24px rgba(0,0,0,.95);
    letter-spacing: .02em;
    padding: 0 20px;
  }
</style>

<!-- dynamic-reveal-frame-v20 -->

<style>
  /* v20: dynamic 11z reveal frame adjustment */
  #viewReveal {
    background: #000 !important;
    overflow: hidden !important;
    padding-top: 85px !important;
    box-sizing: border-box !important;
  }

  #viewReveal iframe,
  iframe.revealMedia,
  iframe#revealFrame,
  iframe#revealIframe {
    width: 100vw !important;
    height: calc(100vh - 85px) !important;
    margin-top: 0px !important;
    border: 0 !important;
    background: #000 !important;
    display: block !important;
  }

  #viewReveal img.revealMedia,
  img#revealImg {
    width: 100vw !important;
    height: 100vh !important;
    object-fit: contain !important;
    object-position: center center !important;
    background: #000 !important;
  }
</style>

<!-- subtle-audio-button-v24 -->

<style>
  /* v24 subtle fallback karaoke audio button */
  #btnKaraokeStart {
    position: fixed !important;
    left: 50% !important;
    bottom: 16px !important;
    transform: translateX(-50%) !important;
    font-size: 12px !important;
    line-height: 1.2 !important;
    padding: 6px 10px !important;
    border-radius: 999px !important;
    opacity: 0.42 !important;
    z-index: 99999 !important;
    max-width: 78vw !important;
    white-space: nowrap !important;
    backdrop-filter: blur(4px) !important;
  }
</style>

</head>
<body>
  <div id="fxLayer"></div>

  <section id="viewIdle" class="view">
    <div class="idleWrap">
      <img id="idleLogo" class="idleLogo hidden" alt="" />
      <div id="idleHeart" class="heart">❤️</div>
      <div class="idleText">Get ready</div>
      <div class="hint">Keep this page open</div>
    </div>
  </section>

  <div id="soundHint" class="soundBox">
    <span>Sound</span><button id="btnEnableSound">Enable Sound</button>
  </div>

  <section id="viewLogo" class="view hidden"><img id="logoImg" alt="Logo" /></section>
  <section id="viewAnim" class="view hidden"><div class="spiral"></div></section>

  <section id="viewReveal" class="view hidden">
    <img id="revealImg" class="revealMedia hidden" alt="Reveal" />
    <iframe id="revealFrame" class="revealMedia hidden" allow="autoplay; fullscreen"></iframe>
  </section>

  <section id="viewClient" class="view hidden">
    <div id="clientCard"></div>
    <img id="clientImg" class="hidden" alt="Client" />
    <div id="clientMsg" class="hidden"></div>
  </section>



  <section id="viewKaraoke" class="view hidden">
    <div id="karaokeBg"></div>
    <div id="karaokeOverlay"></div>
    <div id="karaokeContent">
      <div id="karaokeTitleEl" class="karaokeTitle"></div>
      <div id="karaokePrev" class="karaokeLine karaokeDim"></div>
      <div id="karaokeCurrent" class="karaokeLine karaokeCurrent">Tap Enable Sound & Start</div>
      <div id="karaokeNext" class="karaokeLine karaokeDim"></div>
      <button id="btnKaraokeStart" class="karaokeStartBtn">Enable Sound & Start</button>
      <div id="karaokeStatus" class="karaokeStatus"></div>
      <div class="karaokeBars"><span></span><span></span><span></span><span></span></div>
    </div>
  </section>

  <section id="viewReview" class="view hidden">
    <h1 id="reviewTitle">Thank you!</h1>
    <div id="reviewMsg" class="reviewMsg hidden"></div>
    <button id="btnReview" class="reviewBtn">Leave a Google Review</button>
    <div id="countdown" class="countdown"></div>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/audience.js?v=83"></script>

  <div id="karaokePhotoEnd" class="screen hidden">
    <img id="karaokePhotoEndImg" alt="Client photo" />
    <div id="karaokePhotoEndText">Thank you!</div>
  </div>

</body>
</html>
